# Copy to ./kiri.toml, ~/.kiri/config.toml, or $KIRI_CONFIG.
# Env vars override every value.

[transport]
# discord | terminal
name = "discord"

[model]
# anthropic | openrouter | openai | xai
provider = "anthropic"
# an exact provider model id; xai serves an alias as a different model
name = "claude-opus-4-8"
context_window = 200000
# summary_model = "claude-haiku-4-5"
# summary_provider = "anthropic"

[providers.anthropic]
api_key = ""

[providers.openrouter]
api_key = ""

[providers.openai]
api_key = ""
# base_url = ""

[providers.xai]
# oauth against your SuperGrok / X Premium+ subscription: `kiri auth login xai`,
# or just talk to kiri and it posts a device code. kiri defaults to the public
# Grok Build client id; override it here only when using a different OAuth client.
# client_id = ""
# fallback only. xai allowlists its oauth api surface separately from the
# subscription and can 403 a valid account. never used automatically.
api_key = ""

[discord]
token = ""
owner_id = 0

[web]
# enables web_search / web_fetch
exa_api_key = ""

[context]
compact_at = 0.75
keep_recent = 6

[stt]
# on-device voice transcription. needs `uv sync --extra stt`.
model = "base"
device = "cpu"
compute_type = "int8"
# language = "en"

[paths]
home = "~/.kiri"
# db = "~/.kiri/kiri.db"
# memory = "~/.kiri/memory"
# One <name>/SKILL.md per skill: a procedure Kiri reads before doing the thing it
# covers. Every skill's description sits in Kiri's prompt so it knows the skill
# exists; the body is only read when it's needed. Run `reload` after editing one.
# Your skills here are indexed alongside the ones Kiri ships with; give one the
# name of a built-in to replace it.
# skills = "~/.kiri/skills"
# mcp_config = "~/.kiri/mcp.json"
# credentials = "~/.kiri/credentials.json"
# prompt_file = ""
